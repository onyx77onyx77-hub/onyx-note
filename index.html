<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX | L'Exception</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d4af37; --text-main: #5d4037; --white: #ffffff; }
        
        body { 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 50%, #fce4ec 100%); 
            margin: 0; min-height: 100vh; font-family: 'Nunito', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            color: var(--text-main); overflow: hidden;
        }

        .onyx-card { 
            background: rgba(255, 255, 255, 0.98); width: 90%; max-width: 440px; 
            border-radius: 60px; padding: 60px 40px; text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.08); border: 4px solid var(--white); 
            animation: fadeIn 1s ease-out; position: relative;
        }

        .logo-cloud { font-size: 4rem; margin-bottom: 20px; display: block; animation: float 3s infinite ease-in-out; }
        
        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 2px; color: #000; }
        .domain-tag { font-size: 0.8rem; font-weight: 700; color: var(--accent); letter-spacing: 3px; margin-bottom: 40px; display: block; text-transform: uppercase; }
        
        p { font-size: 1rem; line-height: 1.6; color: #777; margin-bottom: 40px; font-weight: 400; }
        .highlight { color: var(--text-main); font-weight: 700; }

        .btn-start { 
            background: #000; color: white; padding: 22px 40px; border-radius: 50px; border: none; 
            font-weight: 800; font-size: 1rem; width: 100%; cursor: pointer; 
            transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; display: inline-block;
            box-sizing: border-box;
        }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .footer-note { margin-top: 30px; font-size: 0.7rem; color: #bbb; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <div class="onyx-card">
        <span class="logo-cloud">☁️</span>
        <h1>ONYX</h1>
        <span class="domain-tag">L'Exception</span>
        
        <p>
            Offrez un espace éphémère et privilégié. <br>
            Créez une <span class="highlight">Note de Nuage</span> privée, <br>
            élégante et protégée.
        </p>

        <a href="jean-config.html" class="btn-start">Créer une Note</a>

        <div class="footer-note">
            Genève • Lausanne • Zürich
        </div>
    </div>

</body>
</html>
