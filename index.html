<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX | L'Exception</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 50%, #fce4ec 100%); 
            margin: 0; min-height: 100vh; font-family: 'Nunito', sans-serif; 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* Feux d'artifice de bienvenue (en fond) */
        canvas#welcomeFireworks { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }

        .onyx-card { 
            background: rgba(255, 255, 255, 0.98); width: 85%; max-width: 400px; 
            border-radius: 70px; padding: 60px 40px; text-align: center; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.05); border: 8px solid white; 
            position: relative; z-index: 10;
        }

        .icon-float { position: absolute; font-size: 1.5rem; opacity: 0.3; animation: floatIcon 6s infinite ease-in-out; }
        @keyframes floatIcon { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(20deg); } }

        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: 3px; margin: 0; color: #000; }
        .tag { color: #d4af37; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 30px; display: block; }

        /* Le Bouton */
        .btn { 
            background: #000; color: white !important; padding: 20px; border-radius: 50px; 
            text-decoration: none; display: block; font-weight: 800; margin-top: 30px; 
            transition: 0.3s; cursor: pointer; border: none;
            position: relative; z-index: 999;
        }
        .btn:hover { transform: scale(1.05); background: #333; }
    </style>
</head>
<body>
    <canvas id="welcomeFireworks"></canvas>

    <div class="icon-float" style="top:10%; left:10%;">✨</div>
    <div class="icon-float" style="top:20%; right:15%; animation-delay: 1s;">☁️</div>
    <div class="icon-float" style="bottom:15%; left:20%; animation-delay: 2s;">💎</div>
    
    <div class="onyx-card">
        <span style="font-size: 4rem;">☁️</span>
        <h1>ONYX</h1>
        <span class="tag">L'Exception</span>
        <p style="color: #888; line-height: 1.6;">Offrez un espace éphémère et privilégié pour vos rencontres.</p>
        
        <a href="jean-config.html" onclick="startAdventure(event)" class="btn">Commencer l'expérience</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // 1. Les feux d'artifice de bienvenue
        window.onload = () => {
            const duration = 4 * 1000;
            const end = Date.now() + duration;
            const welcomeCanvas = document.getElementById('welcomeFireworks');

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.6 },
                    colors: ['#d4af37', '#e1bee7', '#ffffff']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.6 },
                    colors: ['#d4af37', '#e1bee7', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        };

        // 2. L'explosion de confettis d'icônes (VISSUELL 2) au clic
        function startAdventure(event) {
            // Empêche la page de changer immédiatement
            event.preventDefault(); 
            const destination = event.target.href;

            // Création des confettis d'icônes multicolores
            // (Nous utilisons des formes personnalisées pour simuler des icônes)
            const defaults = {
              spread: 360,
              ticks: 100,
              gravity: 0.5,
              decay: 0.94,
              startVelocity: 30,
              shapes: ['circle', 'square'], // Simule des formes d'icônes
              colors: ['#FFD700', '#FF69B4', '#87CEEB', '#9370DB', '#32CD32'] // Couleurs vives (Gold, Pink, Blue, Purple, Green)
            };

            function shoot() {
              confetti({
                ...defaults,
                particleCount: 80,
                scalar: 1.5, // Taille des icônes
              });

              confetti({
                ...defaults,
                particleCount: 40,
                scalar: 0.75, // Icônes plus petites pour le relief
              });
            }

            // Déclenche l'explosion
            shoot();

            // Attend un court instant (1 seconde) pour laisser l'effet visuel se produire
            // avant d'ouvrir la page suivante.
            setTimeout(() => {
                window.location.href = destination;
            }, 1000); 
        }
    </script>
</body>
</html>
