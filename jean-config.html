<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX | Configuration</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d4af37; --lilas: #C8A2C8; }
        
        body { 
            margin: 0; padding: 40px 0; font-family: 'Nunito', sans-serif;
            background: #fdfbfb; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-x: hidden;
        }

        /* --- LES BULLES DE SAVON (STYLE GITHUB) --- */
        .bubble { 
            position: fixed; border-radius: 50%; background: rgba(255,255,255,0.7); 
            z-index: 1; border: 1px solid rgba(200, 162, 200, 0.2);
            animation: rise 15s linear infinite; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.8);
        }
        @keyframes rise {
            0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        /* --- PARTICULES AU CLIC --- */
        .love-particle { position: fixed; pointer-events: none; z-index: 100; font-size: 1.5rem; }

        .container { 
            background: white; padding: 40px; border-radius: 50px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.05);
            width: 90%; max-width: 420px; z-index: 10; text-align: center;
            border: 6px solid white; position: relative;
        }

        h1 { color: #000; font-weight: 800; margin-bottom: 5px; font-size: 1.6rem; letter-spacing: -0.5px; }
        .subtitle { color: var(--lilas); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; display: block; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #bbb; margin-bottom: 8px; margin-left: 10px; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 15px 20px; border-radius: 25px; 
            border: 1px solid #f5f5f5; outline: none; box-sizing: border-box;
            background: #fafafa; font-family: 'Nunito'; font-size: 1rem;
        }

        /* GRILLE DES SITES (Ton style de sélection) */
        .site-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .site-option { 
            padding: 12px 5px; border: 1.5px solid #f0f0f0; border-radius: 18px; 
            cursor: pointer; transition: 0.3s; font-size: 0.75rem; font-weight: 700; color: #aaa; background: #fff;
        }
        .site-option.active { border-color: var(--lilas); color: var(--lilas); background: #fdfaff; }

        /* UPLOAD PHOTO */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .photo-upload { 
            aspect-ratio: 1/1; background: #fafafa; border: 2px dashed #eee; 
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden; font-size: 1.5rem; color: #ddd;
        }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        .btn-continue {
            background: #000; color: white; border: none; padding: 18px 40px; border-radius: 50px;
            font-weight: 800; cursor: pointer; width: 100%; margin-top: 30px;
            transition: 0.3s; font-size: 1rem;
        }
        .btn-continue:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <h1>L'Exception</h1>
        <span class="subtitle">Configuration ONYX</span>
        
        <div class="form-group">
            <label>Noms</label>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="jeanName" placeholder="Ton prénom">
                <input type="text" id="anaName" placeholder="Son prénom">
            </div>
        </div>

        <div class="form-group">
            <label>Où as-tu remarqué sa photo ?</label>
            <div class="site-grid">
                <div class="site-option" onclick="selectSite(this, 'Tinder')">Tinder</div>
                <div class="site-option" onclick="selectSite(this, 'Instagram')">Instagram</div>
                <div class="site-option" onclick="selectSite(this, 'Autre')">Autre</div>
            </div>
        </div>

        <div class="form-group">
            <label>Les 3 photos du profil</label>
            <div class="photo-grid">
                <div class="photo-upload" onclick="triggerUpload(1)" id="v1">+</div>
                <div class="photo-upload" onclick="triggerUpload(2)" id="v2">+</div>
                <div class="photo-upload" onclick="triggerUpload(3)" id="v3">+</div>
            </div>
            <input type="file" id="p1" hidden accept="image/*" onchange="preview(this, 'v1')">
            <input type="file" id="p2" hidden accept="image/*" onchange="preview(this, 'v2')">
            <input type="file" id="p3" hidden accept="image/*" onchange="preview(this, 'v3')">
        </div>

        <button class="btn-continue" onclick="startAdventure(event)">Continuer l'aventure ➔</button>
    </div>

    <script>
        let selectedSiteName = "";
        const words = ["Amour", "Douceur", "Lilas", "Confiance", "Oser", "Magie"];

        function selectSite(el, s) {
            document.querySelectorAll('.site-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active'); selectedSiteName = s;
        }

        function triggerUpload(id) { document.getElementById('p' + id).click(); }
        function preview(input, divId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { document.getElementById(divId).innerHTML = `<img src="${e.target.result}">`; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // BULLLES D'ENCOURAGEMENT
        function createBubble() {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerText = words[Math.floor(Math.random()*words.length)];
            b.style.color = "#C8A2C8";
            b.style.fontSize = "0.7rem";
            b.style.fontWeight = "800";
            const size = 65 + Math.random()*25;
            b.style.width = size+'px'; b.style.height = size+'px';
            b.style.left = Math.random()*90 + '%'; b.style.bottom = "-100px";
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 15000);
        }
        setInterval(createBubble, 2500);

        // FEU D'ARTIFICE
        function fireLove(x, y) {
            const icons = ['✨', '💖', '🪻', '🌸'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'love-particle';
                p.innerText = icons[Math.floor(Math.random()*icons.length)];
                p.style.left = x + 'px'; p.style.top = y + 'px';
                document.body.appendChild(p);
                const angle = Math.random() * Math.PI * 2;
                const velocity = 80 + Math.random() * 150;
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(0.5)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle)*velocity}px), calc(-50% + ${Math.sin(angle)*velocity}px)) scale(1.5)`, opacity: 0 }
                ], { duration: 1200, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        function startAdventure(e) {
            fireLove(e.clientX, e.clientY);
            setTimeout(() => { window.location.href = "onyx-transition.html"; }, 1000);
        }
    </script>
</body>
</html>
