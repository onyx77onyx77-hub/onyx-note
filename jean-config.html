<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX | Configuration</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffafbd; --lilas: #C8A2C8; }
        body { 
            margin: 0; padding: 0; font-family: 'Nunito', sans-serif;
            background: #fdfbfb; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* BULLES DE SAVON EN ARRIÈRE-PLAN */
        .bubble { 
            position: fixed; border-radius: 50%; background: rgba(255,255,255,0.6); 
            z-index: 1; border: 1px solid rgba(200,162,200,0.3);
            animation: rise 15s linear infinite; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.8);
        }
        @keyframes rise {
            0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        .container { 
            background: white; padding: 30px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 90%; max-width: 400px; z-index: 10; text-align: center;
            position: relative;
        }

        .lilas-icon { font-size: 3rem; margin-bottom: 10px; }
        h1 { color: var(--lilas); font-weight: 800; margin-bottom: 20px; font-size: 1.5rem; }

        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #888; margin-bottom: 5px; margin-left: 10px; }
        input { 
            width: 100%; padding: 12px 20px; border-radius: 25px; 
            border: 1px solid #f0f0f0; outline: none; box-sizing: border-box;
            background: #fafafa; font-family: 'Nunito';
        }

        .btn-continue {
            background: linear-gradient(135deg, var(--lilas), #e0b0ff);
            color: white; border: none; padding: 15px 40px; border-radius: 30px;
            font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px;
            transition: transform 0.2s; font-size: 1rem;
        }

        /* PARTICULES D'AMOUR */
        .love-particle {
            position: fixed; pointer-events: none; z-index: 100; font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container" id="configBox">
        <div class="lilas-icon">🪻</div> <h1>Préparez votre Nuage</h1>
        
        <div class="form-group">
            <label>VOTRE PRÉNOM</label>
            <input type="text" id="jeanName" placeholder="Jean">
        </div>
        <div class="form-group">
            <label>SON PRÉNOM</label>
            <input type="text" id="anaName" placeholder="Ana">
        </div>
        
        <p style="font-size: 0.8rem; color: #aaa; font-style: italic;">
            Comme un bouquet de lilas, vos souvenirs vont éclore...
        </p>

        <button class="btn-continue" onclick="startAdventure(event)">Continuer l'aventure ➔</button>
    </div>

    <script>
        // --- CRÉATION DES BULLES ---
        const words = ["Amour", "Douceur", "Lilas", "Confiance", "Oser", "Magie"];
        function createBubble() {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerText = words[Math.floor(Math.random()*words.length)];
            b.style.color = "#C8A2C8";
            b.style.fontSize = "0.7rem";
            b.style.fontWeight = "800";
            const size = 60 + Math.random()*30;
            b.style.width = size+'px'; b.style.height = size+'px';
            b.style.left = Math.random()*90 + '%';
            b.style.bottom = "-100px";
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 15000);
        }
        setInterval(createBubble, 2500);
        for(let i=0; i<5; i++) createBubble();

        // --- FEUX D'ARTIFICE D'AMOUR ---
        function fireLove(x, y) {
            const icons = ['💖', '✨', '🪻', '🌸', '🤍', '💫'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'love-particle';
                p.innerText = icons[Math.floor(Math.random()*icons.length)];
                p.style.left = x + 'px'; p.style.top = y + 'px';
                document.body.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 100 + Math.random() * 150;
                
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(0.5)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle)*velocity}px), calc(-50% + ${Math.sin(angle)*velocity}px)) scale(1.5)`, opacity: 0 }
                ], { duration: 1500, easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)' }).onfinish = () => p.remove();
            }
        }

        function startAdventure(e) {
            const j = document.getElementById('jeanName').value || "Jean";
            const a = document.getElementById('anaName').value || "Ana";
            
            // Lancement du feu d'artifice
            fireLove(e.clientX, e.clientY);

            // Sauvegarde des données
            const onyxData = {
                jean: j,
                ana: a,
                timestamp: Date.now()
            };
            localStorage.setItem('onyx_data', JSON.stringify(onyxData));
            localStorage.setItem('isJean', 'true');

            // Petit délai pour profiter de l'effet visuel avant de changer de page
            setTimeout(() => {
                // Ici tu mettras le lien vers ta page suivante (ex: ana-invitation.html ou upload-photos.html)
                window.location.href = "ana-invitation.html"; 
            }, 1200);
        }
    </script>
</body>
</html>
