<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX | Configuration</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d4af37; --lilas: #C8A2C8; }
        body { 
            margin: 0; padding: 40px 0; font-family: 'Nunito', sans-serif;
            background: #fdfbfb; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .bubble { 
            position: fixed; border-radius: 50%; background: rgba(255,255,255,0.6); 
            z-index: 1; border: 1px solid rgba(212, 175, 55, 0.1);
            animation: rise 15s linear infinite; pointer-events: none;
        }
        @keyframes rise {
            0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        .container { 
            background: white; padding: 40px; border-radius: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 90%; max-width: 450px; z-index: 10; text-align: center;
            border: 6px solid white; position: relative;
        }

        h1 { color: var(--accent); font-weight: 800; margin-bottom: 30px; font-size: 1.6rem; letter-spacing: -0.5px; }

        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 0.75rem; font-weight: 800; color: #bbb; margin-bottom: 10px; margin-left: 5px; text-transform: uppercase; letter-spacing: 1.5px; }
        
        input { 
            width: 100%; padding: 15px 20px; border-radius: 25px; 
            border: 1px solid #f2f2f2; outline: none; box-sizing: border-box;
            background: #fafafa; font-family: 'Nunito'; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: #fff; }

        /* SÉLECTION DES SITES (GRILLE VISUELLE) */
        .site-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .site-option { 
            padding: 10px; border: 2px solid #f2f2f2; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; font-size: 0.8rem; font-weight: 700; color: #888;
        }
        .site-option.active { border-color: var(--accent); background: #fffdf5; color: var(--accent); transform: scale(1.05); }

        /* PHOTOS UPLOAD */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .photo-upload { 
            aspect-ratio: 1/1; background: #f9f9f9; border: 2px dashed #eee; 
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden; font-size: 1.5rem; color: #ddd; transition: 0.3s;
        }
        .photo-upload:hover { border-color: var(--accent); background: #fff; }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        .btn-continue {
            background: #000; color: white; border: none; padding: 20px 40px; border-radius: 50px;
            font-weight: 800; cursor: pointer; width: 100%; margin-top: 35px;
            transition: 0.3s; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn-continue:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Votre Histoire</h1>
        
        <div class="form-group">
            <label>Prénoms</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="jeanName" placeholder="Toi">
                <input type="text" id="anaName" placeholder="Elle">
            </div>
        </div>

        <div class="form-group">
            <label>Où as-tu vu son profil ?</label>
            <div class="site-grid" id="siteGrid">
                <div class="site-option" onclick="selectSite(this, 'Tinder')">Tinder</div>
                <div class="site-option" onclick="selectSite(this, 'Bumble')">Bumble</div>
                <div class="site-option" onclick="selectSite(this, 'Hinge')">Hinge</div>
                <div class="site-option" onclick="selectSite(this, 'Happn')">Happn</div>
                <div class="site-option" onclick="selectSite(this, 'Instagram')">Instagram</div>
                <div class="site-option" onclick="selectSite(this, 'Autre')">Autre</div>
            </div>
            <input type="hidden" id="selectedSite" value="">
        </div>

        <div class="form-group">
            <label>3 clichés pour votre nuage</label>
            <div class="photo-grid">
                <div class="photo-upload" onclick="triggerUpload(1)" id="v1"><span>+</span></div>
                <div class="photo-upload" onclick="triggerUpload(2)" id="v2"><span>+</span></div>
                <div class="photo-upload" onclick="triggerUpload(3)" id="v3"><span>+</span></div>
            </div>
            <input type="file" id="p1" hidden accept="image/*" onchange="preview(this, 'v1')">
            <input type="file" id="p2" hidden accept="image/*" onchange="preview(this, 'v2')">
            <input type="file" id="p3" hidden accept="image/*" onchange="preview(this, 'v3')">
        </div>

        <button class="btn-continue" onclick="saveAndGo()">Sceller ces souvenirs ➔</button>
    </div>

    <script>
        let selectedSiteName = "";

        function selectSite(element, site) {
            document.querySelectorAll('.site-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
            selectedSiteName = site;
        }

        function triggerUpload(id) {
            document.getElementById('p' + id).click();
        }

        function preview(input, divId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const container = document.getElementById(divId);
                    container.innerHTML = `<img src="${e.target.result}">`;
                    localStorage.setItem('onyx_img_' + divId, e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveAndGo() {
            const data = {
                jean: document.getElementById('jeanName').value || "Jean",
                ana: document.getElementById('anaName').value || "Ana",
                site: selectedSiteName || "notre rencontre",
                timestamp: Date.now()
            };
            localStorage.setItem('onyx_data', JSON.stringify(data));
            window.location.href = "onyx-transition.html";
        }

        // Bulles décoratives
        function createBubble() {
            const b = document.createElement('div'); b.className = 'bubble';
            const size = 30 + Math.random()*50; b.style.width = size+'px'; b.style.height = size+'px';
            b.style.left = Math.random()*100 + '%'; b.style.bottom = "-50px";
            document.body.appendChild(b); setTimeout(() => b.remove(), 15000);
        }
        setInterval(createBubble, 3000);
        for(let i=0; i<4; i++) createBubble();
    </script>
</body>
</html>
