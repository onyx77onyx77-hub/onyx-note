<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration | ONYX</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=CHF&components=buttons,applepay,googlepay&disable-funding=credit,card"></script>
    <style>
        body { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; font-family: 'Nunito', sans-serif; }
        .cloud-card { 
            background: white; width: 90%; max-width: 420px; 
            border-radius: 70px; padding: 45px; text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.05); border: 6px solid #fff;
        }
        input, textarea { 
            width: 100%; border: 2px solid #f8f8f8; border-radius: 25px; padding: 18px; 
            margin-bottom: 15px; font-family: inherit; background: #fafafa; outline: none; box-sizing: border-box;
        }
        .btn-pay { background: #333; color: white; padding: 20px; border-radius: 50px; width: 100%; border: none; font-weight: 800; cursor: pointer; }
        #dashboard { display: none; }
    </style>
</head>
<body>
    <div class="cloud-card" id="setup">
        <h1 style="font-weight:800;">Note Privée</h1>
        <p style="font-size: 0.8rem; color: #d4af37; letter-spacing: 2px; text-transform: uppercase;">Configuration</p>
        <input type="text" id="from" placeholder="Votre Prénom">
        <input type="text" id="to" placeholder="Son Prénom">
        <textarea id="msg" placeholder="Votre message secret..."></textarea>
        <button class="btn-pay" id="btn-show" onclick="showPay()">Activer (2.00 CHF)</button>
        <div id="paypal-container" style="display:none; margin-top:20px;"></div>
    </div>

    <div class="cloud-card" id="dashboard">
        <span style="font-size:3rem;">✨</span>
        <h2>C'est prêt</h2>
        <p style="font-size: 0.9rem; color: #777;">Copiez et envoyez ce lien :</p>
        <div id="link-res" style="background:#f9f9f9; padding:15px; border-radius:20px; font-size:0.7rem; word-break:break-all; margin-bottom:20px;"></div>
        <button onclick="copy()" style="background:#d4af37; color:white; border:none; padding:15px; border-radius:20px; width:100%; font-weight:800;">Copier le lien</button>
    </div>

    <script>
        function showPay() {
            if(!document.getElementById('from').value || !document.getElementById('to').value) return alert("Prénoms requis");
            document.getElementById('btn-show').style.display = 'none';
            document.getElementById('paypal-container').style.display = 'block';
        }
        paypal.Buttons({
            createOrder: function(data, actions) { return actions.order.create({ purchase_units: [{ amount: { value: '2.00', currency_code: 'CHF' } }] }); },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function() {
                    const s = encodeURIComponent(document.getElementById('from').value);
                    const r = encodeURIComponent(document.getElementById('to').value);
                    const m = encodeURIComponent(document.getElementById('msg').value);
                    const url = window.location.href.replace('jean-config.html', 'ana-view.html') + `?from=${s}&to=${r}&msg=${m}`;
                    document.getElementById('setup').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('link-res').innerText = url;
                });
            }
        }).render('#paypal-container');
        function copy() { navigator.clipboard.writeText(document.getElementById('link-res').innerText); alert("Copié !"); }
    </script>
</body>
</html>
