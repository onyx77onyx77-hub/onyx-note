<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX | Configuration</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d4af37; --lilas: #C8A2C8; }
        body { 
            margin: 0; padding: 40px 0; font-family: 'Nunito', sans-serif;
            background: #fdfbfb; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-x: hidden;
        }

        /* --- EFFET 1 : BULLES DE SAVON D'ENCOURAGEMENT --- */
        .bubble { 
            position: fixed; border-radius: 50%; background: rgba(255,255,255,0.6); 
            z-index: 1; border: 1px solid rgba(212, 175, 55, 0.15);
            animation: rise 15s linear infinite; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            text-align: center; box-shadow: inset 0 0 10px rgba(255,255,255,0.8);
        }
        @keyframes rise {
            0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        /* --- EFFET 2 : PARTICULES DE FEU D'ARTIFICE --- */
        .love-particle { position: fixed; pointer-events: none; z-index: 100; font-size: 1.5rem; }

        .container { 
            background: white; padding: 40px; border-radius: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.03);
            width: 90%; max-width: 450px; z-index: 10; text-align: center;
            border: 8px solid white; position: relative;
        }

        h1 { color: #000; font-weight: 800; margin-bottom: 5px; font-size: 1.6rem; }
        .subtitle { color: var(--accent); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; display: block; }

        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #bbb; margin-bottom: 10px; margin-left: 5px; text-transform: uppercase; letter-spacing: 1.5px; }
        
        input { 
            width: 100%; padding: 15px 20px; border-radius: 25px; 
            border: 1px solid #f2f2f2; outline: none; box-sizing: border-box;
            background: #fafafa; font-family: 'Nunito'; font-size: 1rem;
        }

        .site-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .site-option { 
            padding: 12px 5px; border: 2px solid #f8f8f8; border-radius: 18px; 
            cursor: pointer; transition: 0.3s; font-size: 0.75rem; font-weight: 700; color: #aaa; background: #fdfdfd;
        }
        .site-option.active { border-color: var(--accent); background: #fff; color: #000; box-shadow: 0 5px 15px rgba(212,175,55,0.1); }

        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; }
        .photo-upload { 
            aspect-ratio: 1/1; background: #f9f9f9; border: 2px dashed #eee; 
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden; font-size: 1.5rem; color: #ddd;
        }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        .btn-continue {
            background: #000; color: white; border: none; padding: 20px 40px; border-radius: 50px;
            font-weight: 800; cursor: pointer; width: 100%; margin-top: 35px;
            transition: 0.3s; font-size: 1.1rem; position: relative;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>L'Exception</h1>
        <span class="subtitle">Configuration du Nuage</span>
        
        <div class="form-group">
            <label>Vos identités</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="jeanName" placeholder="Ton prénom">
                <input type="text" id="anaName" placeholder="Son prénom">
            </div>
        </div>

        <div class="form-group">
            <label>Où as-tu remarqué son profil ?</label>
            <div class="site-grid">
                <div class="site-option" onclick="selectSite(this, 'Tinder')">Tinder</div>
                <div class="site-option" onclick="selectSite(this, 'Bumble')">Bumble</div>
                <div class="site-option" onclick="selectSite(this, 'Instagram')">Instagram</div>
            </div>
        </div>

        <div class="form-group">
            <label>Capture ses plus belles photos</label>
            <div class="photo-grid">
                <div class="photo-upload" onclick="triggerUpload(1)" id="v1"><span>+</span></div>
                <div class="photo-upload" onclick="triggerUpload(2)" id="v2"><span>+</span></div>
                <div class="photo-upload" onclick="triggerUpload(3)" id="v3"><span>+</span></div>
            </div>
            <input type="file" id="p1" hidden accept="image/*" onchange="preview(this, 'v1')">
            <input type="file" id="p2" hidden accept="image/*" onchange="preview(this, 'v2')">
            <input type="file" id="p3" hidden accept="image/*" onchange="preview(this, 'v3')">
        </div>

        <button class="btn-continue" onclick="startAdventure(event)">Continuer l'aventure ➔</button>
    </div>

    <script>
        let selectedSiteName = "";
        const encouragingWords = ["Oser", "Magie", "Unique", "Lilas", "Éclore", "Confiance"];

        function selectSite(element, site) {
            document.querySelectorAll('.site-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
            selectedSiteName = site;
        }

        function triggerUpload(id) { document.getElementById('p' + id).click(); }

        function preview(input, divId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { document.getElementById(divId).innerHTML = `<img src="${e.target.result}">`; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- LOGIQUE DES BULLES ---
        function createBubble() {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerText = encouragingWords[Math.floor(Math.random()*encouragingWords.length)];
            b.style.color = "#d4af37";
            b.style.fontSize = "0.7rem";
            b.style.fontWeight = "800";
            const size = 60 + Math.random()*30;
            b.style.width = size+'px'; b.style.height = size+'px';
            b.style.left = Math.random()*90 + '%';
            b.style.bottom = "-100px";
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 15000);
        }
        setInterval(createBubble, 2500);

        // --- LOGIQUE DU FEU D'ARTIFICE ---
        function fireLove(x, y) {
            const icons = ['✨', '💖', '🪻', '🌸', '💫'];
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'love-particle';
                p.innerText = icons[Math.floor(Math.random()*icons.length)];
                p.style.left = x + 'px'; p.style.top = y + 'px';
                document.body.appendChild(p);
                const angle = Math.random() * Math.PI * 2;
                const velocity = 100 + Math.random() * 180;
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(0.5)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle)*velocity}px), calc(-50% + ${Math.sin(angle)*velocity}px)) scale(1.8)`, opacity: 0 }
                ], { duration: 1200, easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)' }).onfinish = () => p.remove();
            }
        }

        function startAdventure(e) {
            fireLove(e.clientX, e.clientY);
            
            const data = {
                jean: document.getElementById('jeanName').value || "Jean",
                ana: document.getElementById('anaName').value || "Ana",
                site: selectedSiteName || "un site de rencontre"
            };
            localStorage.setItem('onyx_data', JSON.stringify(data));

            setTimeout(() => {
                window.location.href = "onyx-transition.html";
            }, 1000);
        }
    </script>
</body>
</html>
