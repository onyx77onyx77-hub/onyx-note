<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
    <title>Jean Configuration | ONYX</title>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to bottom, #e1bee7, #d4af37);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .cloud {
            position: absolute;
            animation: float 5s ease-in-out infinite;
            z-index: 1;
            opacity: 0.6;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 { color: #333; font-weight: 700; margin-bottom: 20px; }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
        }
        .upload-zone {
            border: 2px dashed #d4af37;
            padding: 15px;
            text-align: center;
            margin: 10px 0;
            border-radius: 15px;
            background: #fffafa;
            transition: 0.3s;
        }
        .upload-zone:hover { background: #fdf5e6; }
        .upload-zone p { margin: 5px 0; font-size: 0.9rem; color: #666; }
        
        button {
            background: #000;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.02); background: #333; }
        
        .preview-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="cloud" style="top: 5%; left: 5%; width: 100px;">☁️</div>
    <div class="cloud" style="top: 15%; right: 10%; width: 120px;">☁️</div>

    <div class="container">
        <div class="card">
            <h1>Configuration Onyx</h1>
            <form id="jeanConfigForm">
                <input type="text" id="jeanName" placeholder="Ton Prénom (Jean)" required />
                <input type="text" id="anaName" placeholder="Son Prénom (Ana)" required />
                
                <div class="upload-zone">
                    <p>📸 Photo de ta rencontre</p>
                    <input type="file" id="photo1" accept="image/*" required onchange="previewImage(this, 'p1')" />
                    <img id="p1" class="preview-img" />
                </div>

                <div class="upload-zone">
                    <p>📸 Photo souvenir</p>
                    <input type="file" id="photo2" accept="image/*" onchange="previewImage(this, 'p2')" />
                    <img id="p2" class="preview-img" />
                </div>

                <select id="appSelector" required>
                    <option value="">Où vous êtes-vous rencontrés ?</option>
                    <option value="Tinder">Tinder</option>
                    <option value="Bumble">Bumble</option>
                    <option value="Hinge">Hinge</option>
                    <option value="Happn">Happn</option>
                    <option value="Autre">Autre</option>
                </select>

                <button type="submit" id="submitBtn">Générer l'invitation</button>
            </form>
        </div>
    </div>

    <script>
        // Aperçu des images
        function previewImage(input, id) {
            const preview = document.getElementById(id);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'inline-block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Gestion du formulaire
        document.getElementById('jeanConfigForm').onsubmit = async function(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Création en cours...";
            btn.disabled = true;

            // Ici, on stocke les infos localement pour l'instant
            // (Firebase sera branché ici dans l'étape finale)
            const data = {
                jean: document.getElementById('jeanName').value,
                ana: document.getElementById('anaName').value,
                app: document.getElementById('appSelector').value,
                date: new Date().toLocaleDateString()
            };
            
            localStorage.setItem('onyx_data', JSON.stringify(data));

            // Redirection vers l'invitation
            setTimeout(() => {
                window.location.href = 'ana-invitation.html';
            }, 1500);
        };
    </script>
</body>
</html>
