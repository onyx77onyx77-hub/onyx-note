<script>
        // --- COMPRESSION DES PHOTOS ---
        function processImg(input, storageKey, previewId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxW = 400; 
                        const scale = maxW / img.width;
                        canvas.width = maxW;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const compressedData = canvas.toDataURL('image/jpeg', 0.5); 
                        const slot = document.getElementById(previewId);
                        slot.style.backgroundImage = `url(${compressedData})`;
                        slot.style.borderStyle = "solid";
                        slot.innerText = "";
                        localStorage.setItem(storageKey, compressedData);
                    };
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function checkCustomApp() {
            const selector = document.getElementById('appSelector');
            const customInput = document.getElementById('customAppInput');
            customInput.style.display = (selector.value === "Autre") ? "block" : "none";
        }

        // --- GESTION DU CLIC ET REDIRECTION ---
        document.getElementById('payBtn').addEventListener('click', function() {
            const jean = document.getElementById('prenomJean').value;
            const ana = document.getElementById('prenomAna').value;
            
            if(!jean || !ana) { 
                alert("Hop là ! Les prénoms sont obligatoires ✨"); 
                return; 
            }

            const selector = document.getElementById('appSelector');
            const customInput = document.getElementById('customAppInput');
            const sourceFinale = (selector.value === "Autre") ? customInput.value : selector.value;
            
            const onyxData = {
                jean: jean,
                ana: ana,
                origine: sourceFinale,
                timestamp: Date.now(),
                img1: localStorage.getItem('onyx_img1') || "",
                img2: localStorage.getItem('onyx_img2') || "",
                img3: localStorage.getItem('onyx_img3') || ""
            };

            // Sauvegarde Cloud et redirection vers le fichier exact du Hub
            if (window.saveToFirebase) {
                window.saveToFirebase(onyxData).then(() => {
                    // Suppression de l'erreur 404 : on pointe vers le fichier confirmé
                    window.location.href = "ana-invitation.html";
                }).catch(err => {
                    alert("Erreur Cloud. Réessaie avec des photos plus légères (captures d'écran) !");
                    console.error(err);
                });
            } else {
                alert("Firebase n'est pas encore chargé. Patiente une seconde !");
            }
        });

        // Animations d'ambiance
        const apps = ['Tinder', 'Bumble', 'Meetic', 'Happn', 'Hinge'];
        const icons = ['🌸', '✨', '🌺', '💫'];

        function createFlower() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = icons[Math.floor(Math.random() * icons.length)];
            p.style.left = Math.random() * 100 + 'vw'; p.style.top = '-50px';
            document.body.appendChild(p);
            p.animate([{ transform: 'translateY(0) rotate(0deg)', opacity: 0 }, { opacity: 0.6, offset: 0.2 }, { transform: `translateY(110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }], { duration: 10000 + Math.random() * 5000, easing: 'linear' }).onfinish = () => p.remove();
        }

        function spawnBubble() {
            const b = document.createElement('div');
            const size = 90 + Math.random() * 30;
            b.className = 'soap-bubble';
            b.style.width = size + 'px'; b.style.height = size + 'px';
            b.style.left = Math.random() * 90 + '%'; b.style.bottom = '-150px';
            b.innerText = apps[Math.floor(Math.random() * apps.length)];
            document.body.appendChild(b);
            b.animate([{ transform: 'translateY(0)' }, { transform: 'translateY(-130vh)' }], { duration: 18000 + Math.random() * 4000, easing: 'linear' }).onfinish = () => b.remove();
        }

        setInterval(createFlower, 1000);
        setInterval(spawnBubble, 4500);
        window.onload = () => { 
            localStorage.clear(); 
            for(let i=0; i<3; i++) setTimeout(spawnBubble, i * 1500); 
        };
    </script>
