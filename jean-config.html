<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300&display=swap" rel="stylesheet">
    <title>Jean Configuration</title>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to bottom, #e1bee7, #d4af37);
            overflow: hidden;
            position: relative;
        }
        .cloud {
            position: absolute;
            animation: float 5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
        }
        input[type="text"], input[type="file"], select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #d4af37;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #c3a53e;
        }
        .upload-zone {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="cloud" style="top: 10%; left: 10%;">
        <img src="cloud.png" alt="cloud" />
    </div>
    <div class="cloud" style="top: 20%; right: 15%;">
        <img src="cloud.png" alt="cloud" />
    </div>
    <div class="container">
        <div class="card">
            <h1>Jean Configuration</h1>
            <form id="jeanConfigForm">
                <input type="text" id="jeanName" placeholder="Jean's Name" required />
                <input type="text" id="anaName" placeholder="Ana's Name" required />
                <div class="upload-zone" id="uploadZone1">
                    <p>Upload Photo 1</p>
                    <input type="file" accept="image/*" onchange="previewImage(event, 'preview1')" />
                    <img id="preview1" src="#" alt="Preview" style="display:none;" />
                </div>
                <div class="upload-zone" id="uploadZone2">
                    <p>Upload Photo 2</p>
                    <input type="file" accept="image/*" onchange="previewImage(event, 'preview2')" />
                    <img id="preview2" src="#" alt="Preview" style="display:none;" />
                </div>
                <div class="upload-zone" id="uploadZone3">
                    <p>Upload Photo 3</p>
                    <input type="file" accept="image/*" onchange="previewImage(event, 'preview3')" />
                    <img id="preview3" src="#" alt="Preview" style="display:none;" />
                </div>
                <select id="appSelector" required>
                    <option value="">Select App</option>
                    <option value="Tinder">Tinder</option>
                    <option value="Bumble">Bumble</option>
                    <option value="Meetic">Meetic</option>
                    <option value="Happn">Happn</option>
                    <option value="Hinge">Hinge</option>
                    <option value="Autre">Autre</option>
                </select>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
    <script>
        function previewImage(event, previewId) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById(previewId).src = reader.result;
                document.getElementById(previewId).style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
        document.getElementById('jeanConfigForm').onsubmit = function(event) {
            event.preventDefault();
            // Handle photo compression and upload to Firebase
            // Redirect to ana-invitation.html
            window.location.href = 'ana-invitation.html';
        };
    </script>
</body>
</html>
