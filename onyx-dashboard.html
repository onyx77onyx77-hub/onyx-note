<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Votre Nuage | ONYX</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqjsoUcj02JYzsB3HwRoe0Tib5EYKl9ow",
            authDomain: "onyx-125fd.firebaseapp.com",
            databaseURL: "https://onyx-125fd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "onyx-125fd",
            storageBucket: "onyx-125fd.firebasestorage.app",
            messagingSenderId: "908904729319",
            appId: "1:908904729319:web:372d584a5b1b52f33db042"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let welcomeSent = false;

        onValue(ref(db, 'session/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('chatWith').innerText = `${data.jean} & ${data.ana}`;
                displayPhotos(data);
                initTimer(data.timestamp);
                if (!welcomeSent) {
                    appendMessage(`Bienvenue dans votre nuage, ${data.ana}. ✨`, false);
                    welcomeSent = true;
                }
            }
        });

        window.sendMessage = function() {
            const input = document.getElementById('userInput');
            if (input.value.trim() !== "") {
                push(ref(db, 'chat/'), { texte: input.value, auteur: localStorage.getItem('jean') || "Ana", timestamp: Date.now() });
                input.value = "";
            }
        };

        onChildAdded(ref(db, 'chat/'), (snap) => {
            const m = snap.val();
            appendMessage(m.texte, m.auteur === localStorage.getItem('jean'));
        });

        function appendMessage(text, isMe) {
            const m = document.createElement('div');
            m.className = "msg " + (isMe ? "is-me" : "is-not-me");
            m.innerText = text;
            const area = document.getElementById('messagesArea');
            area.appendChild(m);
            area.scrollTop = area.scrollHeight;
        }

        function displayPhotos(data) {
            const container = document.getElementById('photoContainer');
            container.innerHTML = "";
            [data.img1, data.img2, data.img3].forEach((img, i) => {
                if (img) container.innerHTML += `<img src="${img}" class="pola" style="transform: rotate(${i*6-6}deg)">`;
            });
        }

        function initTimer(ts) {
            const duration = 172800000; 
            setInterval(() => {
                const rem = duration - (Date.now() - ts);
                const h = Math.max(0, Math.floor(rem/3600000)), m = Math.max(0, Math.floor((rem%3600000)/60000));
                document.getElementById('timer').innerText = `⏱ Expire dans ${h}h ${m}m`;
            }, 1000);
        }
    </script>

    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Nunito', sans-serif; 
            background: #f4f4f7; height: 100vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
        }

        /* --- LE NUAGE (AU-DESSUS) --- */
        .cloud-container {
            position: relative; width: 92%; max-width: 420px; height: 82vh;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.08));
            z-index: 100; /* Priorité absolue */
            display: flex; align-items: center; justify-content: center;
            animation: cloudFloat 6s infinite ease-in-out;
        }

        .cloud-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            z-index: -1;
        }
        .cloud-bg::before { content: ''; position: absolute; background: white; border-radius: 50%; width: 160px; height: 160px; top: -40px; left: -30px; }
        .cloud-bg::after { content: ''; position: absolute; background: white; border-radius: 50%; width: 140px; height: 140px; bottom: 30px; right: -40px; }

        .content {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            padding: 50px 35px 70px; box-sizing: border-box; position: relative;
        }

        @keyframes cloudFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .chat-header h2 { margin: 0; font-size: 1.1rem; color: #ffafbd; font-weight: 800; }
        .timer-info { font-size: 0.65rem; color: #ddd; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .messages-area { flex: 1; overflow-y: auto; padding: 15px 5px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
        .messages-area::-webkit-scrollbar { display: none; }

        .msg { 
            max-width: 85%; padding: 10px 14px; border-radius: 18px; font-weight: 600; font-size: 0.82rem; 
            animation: msgIn 0.3s ease-out forwards; word-wrap: break-word;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .is-me { align-self: flex-end; background: linear-gradient(135deg, #ffafbd, #ffc3a0); color: white; border-bottom-right-radius: 2px; }
        .is-not-me { align-self: flex-start; background: #f0f0f0; color: #5d4037; border-bottom-left-radius: 2px; }

        .photo-gallery { display: flex; gap: 8px; justify-content: center; padding: 10px 0; }
        .pola { width: 50px; height: 50px; border: 3px solid white; border-bottom: 8px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); object-fit: cover; }

        .input-area { padding: 10px 5px; display: flex; gap: 8px; align-items: center; }
        input { flex: 1; border: 1px solid #f0f0f0; padding: 12px 15px; border-radius: 25px; outline: none; font-family: 'Nunito'; background: #fafafa; font-size: 0.85rem; }
        .btn { background: linear-gradient(135deg, #ffafbd, #ffc3a0); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }

        /* --- BULLES (DERRIÈRE SUR LES CÔTÉS) --- */
        .bubble { 
            position: fixed; border-radius: 50%; background: rgba(255,255,255,0.7); 
            z-index: 5; /* Derrière le nuage */
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.65rem; font-weight: 800; color: #ffb3ba; border: 1px solid rgba(255,255,255,0.5);
            animation: rise 16s linear infinite; cursor: pointer; text-align: center; padding: 8px;
            box-shadow: inset 0 0 12px rgba(255,255,255,0.9);
        }
        @keyframes rise {
            0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        .sparkle { position: fixed; pointer-events: none; z-index: 200; font-size: 1.6rem; user-select: none; }
    </style>
</head>
<body>

    <div class="cloud-container">
        <div class="cloud-bg"></div>
        <div class="content">
            <div class="chat-header">
                <h2 id="chatWith">ONYX</h2>
                <div class="timer-info" id="timer">Chargement...</div>
            </div>
            <div id="photoContainer" class="photo-gallery"></div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Éclate une bulle de savon..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn" onclick="sendMessage()">➔</button>
            </div>
        </div>
    </div>

    <script>
        const words = ["Précieuse", "Courage", "Protégés", "Ensemble", "Oser", "Magie", "Sourire", "Confiance", "Douceur", "Écoute", "Sereine", "Lumière", "Unique", "Force", "Bienveillance"];
        const icons = ['🌸', '✨', '💖', '💫', '🤍', '🌈', '💎', '🔥', '🎀'];

        function firework(x, y) {
            const count = 15;
            for (let i = 0; i < count; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.innerText = icons[Math.floor(Math.random() * icons.length)];
                s.style.left = x + 'px'; s.style.top = y + 'px';
                document.body.appendChild(s);
                const angle = (i / count) * Math.PI * 2;
                const velocity = 100 + Math.random() * 150;
                s.animate([
                    { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle)*velocity}px), calc(-50% + ${Math.sin(angle)*velocity}px)) scale(0) rotate(${Math.random()*360}deg)`, opacity: 0 }
                ], { duration: 1200, easing: 'cubic-bezier(0.1, 0.5, 0.3, 1)' }).onfinish = () => s.remove();
            }
        }

        function createBubble(isInit = false) {
            if (document.querySelectorAll('.bubble').length > 20) return; // Limite augmentée
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerText = words[Math.floor(Math.random()*words.length)];
            const size = 70 + Math.random()*25;
            b.style.width = size+'px'; b.style.height = size+'px';
            
            // Placement latéral uniquement (0-20% ou 80-100% de la largeur)
            const side = Math.random() > 0.5 ? (Math.random()*15) : (85 + Math.random()*10);
            b.style.left = side + '%';
            
            if (isInit) {
                b.style.top = (Math.random()*90) + '%';
                b.style.animationDelay = (Math.random()*-15) + 's';
            } else {
                b.style.bottom = "-120px";
            }

            document.body.appendChild(b);
            b.onclick = (e) => { firework(e.clientX, e.clientY); b.remove(); };
            setTimeout(() => { if(b.parentNode) b.remove(); }, 16000);
        }

        // Création immédiate de 10 bulles puis flux continu
        for(let i=0; i<10; i++) setTimeout(() => createBubble(true), i*150);
        setInterval(createBubble, 1200);
    </script>
</body>
</html>
