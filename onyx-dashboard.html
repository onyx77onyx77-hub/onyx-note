<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Salon Privé | ONYX</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqjsoUcj02JYzsB3HwRoe0Tib5EYKl9ow",
            authDomain: "onyx-125fd.firebaseapp.com",
            databaseURL: "https://onyx-125fd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "onyx-125fd",
            storageBucket: "onyx-125fd.firebasestorage.app",
            messagingSenderId: "908904729319",
            appId: "1:908904729319:web:372d584a5b1b52f33db042"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- ÉTAT INITIAL ---
        let welcomeSent = false;

        // --- SYNCHRONISATION INITIALE & ACCUEIL ---
        onValue(ref(db, 'session/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('chatWith').innerText = `${data.jean} & ${data.ana}`;
                displayPhotos(data);
                initTimer(data.timestamp);

                // Message de remerciement/accueil automatique
                if (!welcomeSent) {
                    const welcomeMsg = `Bienvenue dans votre bulle, ${data.ana} ! ✨ Merci d'avoir accepté l'invitation de ${data.jean}. Cet espace sur mesure est à vous pour les prochaines 48h.`;
                    appendMessage(welcomeMsg, false);
                    welcomeSent = true;
                }
            }
        });

        // --- ENVOI DE MESSAGE ---
        window.sendMessage = function() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (text !== "") {
                const chatRef = ref(db, 'chat/');
                push(chatRef, {
                    texte: text,
                    auteur: localStorage.getItem('jean') || "Anonyme",
                    timestamp: Date.now()
                });
                input.value = "";
            }
        };

        // --- RÉCEPTION DES MESSAGES ---
        onChildAdded(ref(db, 'chat/'), (data) => {
            const msg = data.val();
            // On vérifie qui est l'auteur pour placer le message à gauche ou à droite
            const isMe = msg.auteur === localStorage.getItem('jean');
            appendMessage(msg.texte, isMe);
        });

    </script>

    <style>
        :root { 
            --accent: #d4af37; 
            --text-main: #5d4037; 
            --gradient-onyx: linear-gradient(135deg, #ffafbd, #ffc3a0); 
        }
        
        body { 
            margin: 0; padding: 0; font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 50%, #fce4ec 100%); 
            min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }

        .main-cloud {
            position: relative; background: rgba(255, 255, 255, 0.98);
            padding: 20px; z-index: 100; text-align: center;
            width: 90%; max-width: 420px; height: 88vh;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05), inset 0 0 40px rgba(255,255,255,1);
            border: 5px solid white; animation: cloudFloat 6s infinite ease-in-out;
            display: flex; flex-direction: column;
        }

        @keyframes cloudFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .chat-header { padding-top: 10px; margin-bottom: 5px; flex-shrink: 0; }
        .chat-header h2 { 
            margin: 0; font-size: 1.3rem; font-weight: 800; 
            background: var(--gradient-onyx); -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .timer-info { font-size: 0.7rem; color: #bbb; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-top: 2px; }

        .messages-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
        .messages-area::-webkit-scrollbar { display: none; }

        .photo-gallery { display: flex; gap: 8px; justify-content: center; padding: 10px 0; flex-shrink: 0; }
        .polaroid {
            width: 75px; height: 75px; object-fit: cover; 
            border: 4px solid white; border-bottom: 12px solid white;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            border-radius: 2px; transition: 0.3s;
        }
        .polaroid:nth-child(1) { transform: rotate(-6deg); }
        .polaroid:nth-child(2) { transform: rotate(0deg); z-index: 2; scale: 1.1; }
        .polaroid:nth-child(3) { transform: rotate(6deg); }

        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-weight: 600; font-size: 0.85rem; line-height: 1.4; animation: msgIn 0.4s ease-out forwards; opacity: 0; text-align: left; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.is-me { align-self: flex-end; background: var(--gradient-onyx); color: white; border-bottom-right-radius: 4px; }
        .msg.is-not-me { align-self: flex-start; background: #f2f2f2; color: var(--text-main); border-bottom-left-radius: 4px; }

        .input-area { padding: 10px 5px 15px; display: flex; gap: 8px; flex-shrink: 0; }
        input { flex: 1; border: 2px solid #f0f0f0; padding: 12px 18px; border-radius: 25px; outline: none; font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 0.9rem; }
        .btn-send { background: var(--gradient-onyx); border: 2px solid white; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* --- BULLES D'AMBIANCE --- */
        .soap-bubble { 
            position: fixed; border-radius: 50%; background: rgba(255, 255, 255, 0.4); 
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.6);
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.7rem; font-weight: 800; color: #999; 
            backdrop-filter: blur(2px); border: 1px solid rgba(255,255,255,0.3);
            z-index: 1000; text-align: center; cursor: pointer;
        }
        .particle { position: fixed; pointer-events: none; z-index: 2000; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="main-cloud">
        <div class="chat-header">
            <h2 id="chatWith">Chargement...</h2>
            <div class="timer-info" id="timer">⏱ Synchronisation...</div>
        </div>

        <div id="photoContainer" class="photo-gallery"></div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Écrire un mot doux..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="btn-send" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        const area = document.getElementById('messagesArea');
        const iconsPop = ['🌸', '✨', '💖', '💫', '🤍', '🌺'];
        const mots = ["Douceur", "Confiance", "Respect", "Partage", "Écoute"];

        function displayPhotos(data) {
            const container = document.getElementById('photoContainer');
            container.innerHTML = "";
            if (data.img1) container.innerHTML += `<img src="${data.img1}" class="polaroid">`;
            if (data.img2) container.innerHTML += `<img src="${data.img2}" class="polaroid">`;
            if (data.img3) container.innerHTML += `<img src="${data.img3}" class="polaroid">`;
        }

        function appendMessage(text, isMe) {
            const m = document.createElement('div');
            m.className = "msg " + (isMe ? "is-me" : "is-not-me");
            m.innerText = text;
            area.appendChild(m);
            area.scrollTop = area.scrollHeight;
        }

        function initTimer(timestamp) {
            const duration = 48 * 60 * 60 * 1000;
            const timerInterval = setInterval(() => {
                const rem = duration - (Date.now() - timestamp);
                if (rem <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').innerText = "SESSION ÉVAPORÉE";
                    return;
                }
                const h = Math.floor(rem / 3600000);
                const m = Math.floor((rem % 3600000) / 60000);
                const s = Math.floor((rem % 60000) / 1000);
                document.getElementById('timer').innerText = `⏱ Évaporation dans ${h}h ${m}m ${s}s`;
            }, 1000);
        }

        // --- SYSTÈME DE BULLES INTERACTIVES ---
        function createBubble() {
            if (document.querySelectorAll('.soap-bubble').length > 6) return;
            const b = document.createElement('div');
            b.className = 'soap-bubble';
            b.innerText = mots[Math.floor(Math.random()*mots.length)];
            const size = 75 + Math.random()*25;
            b.style.width = size+'px'; b.style.height = size+'px';
            b.style.left = (Math.random()*(window.innerWidth - size)) + 'px';
            b.style.top = (Math.random()*(window.innerHeight - size)) + 'px';
            document.body.appendChild(b);

            b.onclick = (e) => {
                // Effet explosion
                for(let i=0; i<8; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.innerText = iconsPop[Math.floor(Math.random()*iconsPop.length)];
                    p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                    document.body.appendChild(p);
                    p.animate([
                        {opacity:1, transform:'scale(1)'}, 
                        {opacity:0, transform:`translate(${(Math.random()-0.5)*150}px, ${(Math.random()-0.5)*150}px) scale(0)`}
                    ], {duration:800, easing:'ease-out'}).onfinish = () => p.remove();
                }
                b.remove();
            };
            setTimeout(() => { if(b.parentNode) b.remove(); }, 8000);
        }
        setInterval(createBubble, 3500);
    </script>
</body>
</html>
