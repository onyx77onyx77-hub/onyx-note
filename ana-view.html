<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX | L'Exception</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; background: radial-gradient(circle at center, #222, #000); color: white; font-family: 'Nunito', sans-serif; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Bulles de savon */
        .bubble { 
            position: absolute; bottom: -100px; background: rgba(255,255,255,0.1); 
            border-radius: 50%; box-shadow: 0 0 15px rgba(255,255,255,0.2) inset; 
            animation: rise 8s infinite ease-in; z-index: 1; 
        }
        @keyframes rise { 
            0% { transform: translateY(0) scale(1); opacity: 0; } 
            50% { opacity: 0.5; } 
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; } 
        }

        .content { text-align: center; z-index: 10; animation: blurIn 2s ease-out; padding: 20px; }
        @keyframes blurIn { from { filter: blur(20px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
        
        h1 { font-size: 0.7rem; letter-spacing: 5px; color: #d4af37; text-transform: uppercase; }
        .msg { font-size: 1.8rem; font-weight: 600; margin: 40px 0; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <script>
        for(let i=0; i<15; i++) {
            let b = document.createElement('div'); b.className = 'bubble';
            let s = Math.random()*60 + 20 + "px"; b.style.width = s; b.style.height = s;
            b.style.left = Math.random()*100 + "vw"; b.style.animationDuration = 5 + Math.random()*5 + "s";
            b.style.animationDelay = Math.random()*5 + "s"; document.body.appendChild(b);
        }
    </script>
    <div class="content">
        <h1 id="to">POUR VOUS</h1>
        <div class="msg" id="msg">Chargement...</div>
        <div style="opacity:0.4; font-size:0.8rem;" id="from">DE LA PART DE...</div>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById('to').innerText = "POUR " + (p.get('to') || "VOUS").toUpperCase();
        document.getElementById('msg').innerText = p.get('msg') || "...";
        document.getElementById('from').innerText = "DE LA PART DE " + (p.get('from') || "ONYX").toUpperCase();
    </script>
</body>
</html>
