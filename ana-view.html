<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Privée | ox-note-shared.ch</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d4af37; --text-main: #5d4037; }
        body { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 50%, #fce4ec 100%); margin: 0; min-height: 100vh; font-family: 'Nunito', sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .ana-card { background: white; width: 85%; max-width: 400px; border-radius: 60px; padding: 40px 30px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.05); position: relative; z-index: 10; border: 4px solid white; }
        .photo-circle { width: 90px; height: 90px; background: #f0f0f0; border-radius: 50%; margin: 0 auto 20px; border: 3px solid var(--accent); }
        h2 { font-weight: 800; color: var(--text-main); font-size: 1.3rem; margin-bottom: 10px; }
        p.message-text { line-height: 1.5; color: #666; font-size: 0.95rem; font-style: italic; margin-bottom: 25px; }
        #reply-zone { display: none; animation: fadeIn 0.5s ease; }
        textarea { width: 100%; border: 2px solid #f0f0f0; border-radius: 20px; padding: 15px; font-family: inherit; outline: none; box-sizing: border-box; background: #fafafa; height: 100px; resize: none; margin-bottom: 15px; }
        .btn-onyx { background: var(--text-main); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: 800; width: 100%; cursor: pointer; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: 800; width: 100%; cursor: pointer; }
        
        /* BOUQUET & PAPILLONS */
        .bouquet-wrap { position: relative; display: inline-block; margin-bottom: 15px; font-size: 3.5rem; }
        .butterfly { position: absolute; font-size: 1rem; animation: fly 6s infinite linear; }
        @keyframes fly { 0% { transform: translate(0,0) rotate(0); } 50% { transform: translate(15px, -20px) rotate(20deg); } 100% { transform: translate(0,0) rotate(0); } }
        .particle { position: fixed; pointer-events: none; z-index: 200; font-size: 2rem; transform: translate(-50%, -50%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="ana-card" id="main-card">
        <div class="photo-circle"></div>
        <div id="read-mode">
            <h2>Jean vous a écrit...</h2>
            <p class="message-text">"Le hasard crée la rencontre, Onyx crée l’exception. J'aimerais beaucoup faire votre connaissance dans ce petit nuage."</p>
            <button class="btn-onyx" onclick="showReply()">Répondre à Jean</button>
        </div>

        <div id="reply-zone">
            <div class="bouquet-wrap">
                💐 <span class="butterfly" style="top:-10px; left:-15px;">🦋</span>
                <span class="butterfly" style="top:5px; right:-15px; animation-delay: -2s;">🌸</span>
            </div>
            
            <div style="background: #fff8e1; border-radius: 15px; padding: 12px; margin-bottom: 15px; border: 1px solid #ffe082; text-align: left;">
                <p style="font-size: 0.75rem; color: #856404; margin: 0; font-weight: 800;">⏳ Capsule éphémère</p>
                <p style="font-size: 0.7rem; color: #856404; margin: 3px 0 0 0; line-height: 1.3;">
                    Ce nuage disparaîtra dans 48h. C'est votre unique chance de répondre ou de laisser votre contact.
                </p>
            </div>

            <textarea id="ana-msg" placeholder="Votre message pour Jean..."></textarea>
            <button class="btn-send" onclick="sendToJean()">Déposer dans le nuage</button>
        </div>
    </div>

    <script>
        const icons = ['💖', '✨', '🌸', '🕊️', '💗'];
        function launchExplosion(x, y, count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const p = document.createElement('div'); p.className = 'particle'; p.innerText = icons[Math.floor(Math.random() * icons.length)];
                    p.style.left = x + 'px'; p.style.top = y + 'px'; document.body.appendChild(p);
                    const angle = Math.random() * Math.PI * 2; const dist = 100 + Math.random() * 400;
                    p.animate([{ transform: 'translate(-50%, -50%) scale(0)', opacity: 1 }, { transform: `translate(${(Math.cos(angle)*dist)}px, ${(Math.sin(angle)*dist)}px) scale(1)`, opacity: 0 }], 
                    { duration: 2500, easing: 'ease-out' }).onfinish = () => p.remove();
                }, i * 20);
            }
        }
        function showReply() { 
            const r = document.getElementById('main-card').getBoundingClientRect();
            launchExplosion(r.left + r.width/2, r.top + r.height/2, 30);
            document.getElementById('read-mode').style.display = 'none'; 
            document.getElementById('reply-zone').style.display = 'block'; 
        }
        function sendToJean() {
            if(document.getElementById('ana-msg').value.length < 2) return alert("Écrivez un petit mot...");
            document.getElementById('reply-zone').innerHTML = "<h2>Message envoyé</h2><p>Il est maintenant dans le nuage de Jean.</p>";
            const r = document.getElementById('main-card').getBoundingClientRect();
            launchExplosion(r.left + r.width/2, r.top + r.height/2, 60);
        }
        window.onload = () => { setTimeout(() => { launchExplosion(window.innerWidth/2, window.innerHeight/2, 100); }, 600); };
    </script>
</body>
</html>
