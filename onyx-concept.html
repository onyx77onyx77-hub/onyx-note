<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX | Le Concept</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d4af37; --lilas: #C8A2C8; --text-main: #5d4037; }
        body { margin: 0; padding: 0; font-family: 'Nunito', sans-serif; background: #fdfbfb; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .close-concept {
            position: fixed; top: 30px; right: 30px; width: 45px; height: 45px;
            background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 1.5rem; color: var(--lilas);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); z-index: 1000; transition: 0.3s;
            border: 2px solid transparent;
        }
        .close-concept:hover { transform: rotate(90deg); border-color: var(--lilas); color: var(--accent); }

        .sky { position: fixed; top:0; left:0; width: 100%; height: 100%; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 50%, #fce4ec 100%); z-index: -1; }

        h1 { color: var(--accent); font-weight: 800; font-size: 2.2rem; margin-bottom: 40px; letter-spacing: -1px; text-align: center; z-index: 10; padding: 0 20px; }

        .adventure-track { display: flex; align-items: flex-start; justify-content: center; gap: 10px; width: 95%; max-width: 1100px; z-index: 10; }

        .anim-step { flex: 1; position: relative; text-align: center; animation: floatHero 4s infinite ease-in-out; }
        .icon-box { font-size: 2.5rem; margin-bottom: 15px; display: inline-block; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); transition: transform 0.3s; }

        .comic-bubble {
            background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 3px solid white;
            opacity: 0; transform: translateY(20px);
            animation: popIn 0.8s forwards;
        }
        .comic-bubble h3 { margin: 0 0 5px 0; font-size: 1rem; color: var(--accent); }
        .comic-bubble p { margin: 0; font-size: 0.8rem; line-height: 1.3; color: var(--text-main); }

        /* Délais d'apparition des étapes */
        .anim-step:nth-child(1) .comic-bubble { animation-delay: 0.4s; }
        .anim-step:nth-child(3) .comic-bubble { animation-delay: 0.8s; }
        .anim-step:nth-child(5) .comic-bubble { animation-delay: 1.2s; }
        .anim-step:nth-child(7) .comic-bubble { animation-delay: 1.6s; }

        .path-line {
            width: 30px; height: 4px; 
            background: repeating-linear-gradient(90deg, var(--lilas), var(--lilas) 10px, transparent 10px, transparent 20px);
            margin-top: 35px; border-radius: 2px;
            animation: slidePath 2s linear infinite;
        }

        @keyframes popIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes floatHero { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes slidePath { from { background-position: 0 0; } to { background-position: 40px 0; } }

        .btn-ready {
            margin-top: 50px; background: #000;
            color: white; padding: 18px 45px; border-radius: 50px;
            text-decoration: none; font-weight: 800; font-size: 1.1rem;
            border: 3px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            cursor: pointer; opacity: 0; animation: popIn 0.5s forwards 2.2s;
            transition: 0.3s; z-index: 100;
        }
        .btn-ready:hover { transform: scale(1.05); background: #333; }

        /* Style des bulles de savon */
        .bubble { 
            position: fixed; border-radius: 50%; background: rgba(255,255,255,0.4); 
            z-index: 5; border: 1px solid rgba(212, 175, 55, 0.1);
            animation: rise 15s linear infinite; cursor: pointer;
        }
        @keyframes rise {
            0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }
        .particle { position: fixed; pointer-events: none; z-index: 1000; font-size: 1.5rem; }
    </style>
</head>
<body>

    <a href="index.html" class="close-concept" title="Quitter">✕</a>
    <div class="sky"></div>

    <h1>Quatre pas vers votre nuage...</h1>

    <div class="adventure-track">
        <div class="anim-step">
            <div class="icon-box">🎨</div>
            <div class="comic-bubble">
                <h3>Configurez</h3>
                <p>Personnalisez l'écrin avec vos prénoms.</p>
            </div>
        </div>
        <div class="path-line"></div>
        <div class="anim-step">
            <div class="icon-box">🔐</div>
            <div class="comic-bubble">
                <h3>Scellez</h3>
                <p>Générez un code unique (2.90 CHF).</p>
            </div>
        </div>
        <div class="path-line"></div>
        <div class="anim-step">
            <div class="icon-box">✉️</div>
            <div class="comic-bubble">
                <h3>Offrez</h3>
                <p>Invitez l'élu(e) dans votre nuage privé.</p>
            </div>
        </div>
        <div class="path-line"></div>
        <div class="anim-step">
            <div class="icon-box">💬</div>
            <div class="comic-bubble">
                <h3>Échangez</h3>
                <p>Dès l'acceptation, vous avez 48h pour discuter en toute sérénité.</p>
            </div>
        </div>
    </div>

    <a href="jean-config.html" class="btn-ready" id="goBtn">C'est compris ✨</a>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Logique des bulles de savon
        function createBubble() {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = 50 + Math.random() * 50;
            b.style.width = size + 'px'; b.style.height = size + 'px';
            b.style.left = Math.random() * 100 + '%';
            b.style.bottom = "-100px";
            
            b.onclick = (e) => {
                confetti({
                    particleCount: 15,
                    scalar: 0.7,
                    origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                    colors: ['#d4af37', '#e1bee7']
                });
                b.remove();
            };
            
            document.body.appendChild(b);
            setTimeout(() => { if(b.parentNode) b.remove(); }, 15000);
        }
        setInterval(createBubble, 3000);
        for(let i=0; i<4; i++) createBubble();

        // Effet sur le bouton final
        document.getElementById('goBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const url = this.href;
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#d4af37', '#e1bee7', '#ffffff']
            });
            setTimeout(() => { window.location.href = url; }, 1000);
        });
    </script>
</body>
</html>
